<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Brain Games - Graduation Finale</title>
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Cinzel', serif;
			background: radial-gradient(circle at 20% 20%, #12213d 0%, #0a1224 48%, #050a14 100%);
			color: #f3efe7;
			overflow: hidden;
		}

		#confettiCanvas {
			position: fixed;
			inset: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 1;
		}

		.card {
			width: min(760px, 92vw);
			background: linear-gradient(155deg, rgba(251, 248, 239, 0.98) 0%, rgba(244, 235, 210, 0.96) 100%);
			border: 4px solid rgba(166, 124, 42, 0.78);
			border-radius: 22px;
			box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
			padding: 34px 30px 28px;
			text-align: center;
			position: relative;
			z-index: 2;
			overflow: hidden;
		}

		.card::before,
		.card::after {
			content: '';
			position: absolute;
			inset: 12px;
			border: 1.8px solid rgba(131, 95, 26, 0.45);
			border-radius: 14px;
			pointer-events: none;
		}

		.card::after {
			inset: 21px;
			border-color: rgba(131, 95, 26, 0.3);
		}

		h1 {
			margin: 0 0 8px;
			letter-spacing: 0.14em;
			color: #1e2d4e;
			font-size: clamp(2rem, 4vw, 3.1rem);
			text-transform: uppercase;
		}

		.diploma-subtitle {
			margin: 0 0 20px;
			letter-spacing: 0.16em;
			text-transform: uppercase;
			font-size: clamp(0.72rem, 1.7vw, 0.92rem);
			font-weight: 700;
			color: #6f5520;
		}

		p {
			margin: 0 0 16px;
			line-height: 1.6;
			color: #2f2a29;
			font-size: clamp(1rem, 2.3vw, 1.2rem);
		}

		#congratsText {
			margin: 0 0 14px;
			color: #1e2d4e;
			font-size: clamp(1.4rem, 3vw, 2.15rem);
			line-height: 1.4;
		}

		#completionDate {
			margin: 0 0 18px;
			color: #1e2d4e;
			font-size: clamp(1rem, 2vw, 1.2rem);
			font-weight: 700;
		}

		.save-btn {
			display: inline-block;
			margin-top: 14px;
			padding: 11px 22px;
			border: none;
			border-radius: 10px;
			background: linear-gradient(135deg, #a67c2a 0%, #d8bc70 100%);
			color: #fff;
			font-family: inherit;
			font-size: 1rem;
			font-weight: 700;
			cursor: pointer;
			transition: transform 0.15s ease, filter 0.2s ease;
			letter-spacing: 0.06em;
		}

		.save-btn:hover {
			transform: translateY(-2px);
			filter: brightness(1.08);
		}

		.home-actions {
			display: flex;
			justify-content: center;
			gap: 12px;
			margin-top: 14px;
			opacity: 0;
			visibility: hidden;
			transform: translateY(8px);
			transition: opacity 0.35s ease, transform 0.35s ease, visibility 0.35s ease;
		}

		.home-actions.show {
			opacity: 1;
			visibility: visible;
			transform: translateY(0);
		}

		.home-btn {
			padding: 10px 18px;
			border: 2px solid #7f5d1c;
			border-radius: 10px;
			background: #f2e6c5;
			color: #1e2d4e;
			font-family: inherit;
			font-size: 0.95rem;
			font-weight: 700;
			cursor: pointer;
			letter-spacing: 0.04em;
			transition: transform 0.15s ease, background-color 0.2s ease;
		}

		.home-btn:hover {
			transform: translateY(-2px);
			background: #ead5a3;
		}

		@media print {
			body {
				background: #fff;
				display: block;
			}

			@page {
				size: landscape;
				margin: 0.45in;
			}

			#confettiCanvas,
			.save-btn,
			.home-actions {
				display: none !important;
			}

			.card {
				width: 100%;
				max-width: 100%;
				border: 4px solid #a67c2a;
				border-radius: 8px;
				box-shadow: none;
				padding: 44px 38px;
				margin: 0;
				text-align: center;
			}

			.card::before,
			.card::after {
				display: block;
			}

			h1 {
				font-size: 2.25rem;
				color: #1e2d4e !important;
			}

			.diploma-subtitle {
				font-size: 0.8rem;
				color: #6f5520 !important;
			}

			#congratsText {
				font-size: 1.8rem;
				color: #1e2d4e !important;
			}

			#completionDate {
				font-size: 1.1rem;
				color: #1e2d4e !important;
			}
		}
	</style>
</head>
<body>
	<canvas id="confettiCanvas"></canvas>

	<main class="card">
		<h2 class="diploma-subtitle">University of Brain Games</h2>
		<h1 id="congratsText">Congratulations, Distinguished Graduate, you passed!</h1>
		<p id="completionDate">Completed on:</p>
		<button class="save-btn" onclick="window.print()">&#x1F4BE; Save as PDF</button>
		<div class="home-actions" id="homeActions">
			<button class="home-btn" onclick="window.location.href='coverpage.html'">Return to Home</button>
		</div>
	</main>

	<script>
		const canvas = document.getElementById('confettiCanvas');
		const ctx = canvas.getContext('2d');
		const confetti = [];
		const confettiCount = 220;
		const colors = ['#d8bc70', '#1e2d4e', '#ffffff', '#b08a3c', '#2f487a', '#f3efe7'];

		function resizeCanvas() {
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
		}

		function makePiece() {
			const size = Math.random() * 10 + 5;
			return {
				x: Math.random() * canvas.width,
				y: Math.random() * canvas.height - canvas.height,
				w: size,
				h: size * (Math.random() * 0.6 + 0.6),
				color: colors[Math.floor(Math.random() * colors.length)],
				speedY: Math.random() * 3 + 1.5,
				speedX: (Math.random() - 0.5) * 2,
				rotation: Math.random() * Math.PI,
				rotationSpeed: (Math.random() - 0.5) * 0.2
			};
		}

		function initConfetti() {
			confetti.length = 0;
			for (let i = 0; i < confettiCount; i++) {
				confetti.push(makePiece());
			}
		}

		function drawConfetti() {
			ctx.clearRect(0, 0, canvas.width, canvas.height);

			for (const piece of confetti) {
				piece.x += piece.speedX;
				piece.y += piece.speedY;
				piece.rotation += piece.rotationSpeed;

				if (piece.y > canvas.height + 20) {
					Object.assign(piece, makePiece(), { y: -20 });
				}
				if (piece.x < -20) piece.x = canvas.width + 20;
				if (piece.x > canvas.width + 20) piece.x = -20;

				ctx.save();
				ctx.translate(piece.x, piece.y);
				ctx.rotate(piece.rotation);
				ctx.fillStyle = piece.color;
				ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
				ctx.restore();
			}

			requestAnimationFrame(drawConfetti);
		}

		const congratsText = document.getElementById('congratsText');
		const completionDate = document.getElementById('completionDate');
		const homeActions = document.getElementById('homeActions');

		function formatDate(date) {
			const options = { year: 'numeric', month: 'long', day: 'numeric' };
			return date.toLocaleDateString(undefined, options);
		}

		const enteredName = prompt('Enter graduate name for certificate:') || '';
		const graduateName = enteredName.trim() || 'Distinguished Graduate';
		congratsText.textContent = `Congratulations, ${graduateName}, you passed!`;
		completionDate.textContent = `Completed on ${formatDate(new Date())}`;
		setTimeout(() => {
			homeActions.classList.add('show');
		}, 10000);

		resizeCanvas();
		initConfetti();
		drawConfetti();

		window.addEventListener('resize', () => {
			resizeCanvas();
			initConfetti();
		});
	</script>
</body>
</html>
