<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Games - Trivia Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Source Sans 3', sans-serif;
            background:
                radial-gradient(circle at 20% 15%, #2449ad 0%, #132b73 35%, #07143d 70%, #040b24 100%);
            color: #f8f6ea;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            transition: background 0.5s ease;
        }
        .container {
            width: 100%;
            max-width: 760px;
            border: 4px solid #caa449;
            padding: 28px;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45), inset 0 0 0 2px rgba(243, 214, 123, 0.45);
            background: linear-gradient(165deg, rgba(14, 35, 98, 0.95) 0%, rgba(9, 24, 71, 0.94) 100%);
            position: relative;
            z-index: 1;
            border-radius: 16px;
        }
        h1 {
            margin: 0 0 18px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3.4rem);
            letter-spacing: 0.08em;
            color: #f6cf63;
            text-shadow: 0 0 14px rgba(245, 197, 80, 0.35);
        }
        .subtitle {
            margin: 0 0 24px;
            color: #e6ddbf;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .score-tracker {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f6cf63 0%, #c18f29 100%);
            color: #09173f;
            padding: 10px 18px;
            border-radius: 10px;
            border: 2px solid rgba(255, 234, 174, 0.6);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        }
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: linear-gradient(90deg, #f6cf63, #e6b63f, #b98223);
            width: 0%;
            transition: width 0.6s ease;
            z-index: 10;
            border-radius: 0 10px 10px 0;
        }
        .question-card {
            border: 2px solid rgba(252, 226, 157, 0.6);
            padding: 28px;
            background: linear-gradient(180deg, rgba(21, 47, 122, 0.78) 0%, rgba(15, 36, 95, 0.78) 100%);
            min-height: 260px;
            border-radius: 12px;
            box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.3);
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 24px;
            line-height: 1.4;
            color: #fff9df;
        }
        .answers {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .answer-button {
            border: 2px solid #b0892e;
            background: linear-gradient(165deg, #0e2b7f 0%, #0b2267 100%);
            color: #f9f1d1;
            padding: 16px 18px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: transform 0.15s, background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
            border-radius: 10px;
            font-weight: 700;
        }
        .answer-button:hover {
            transform: translateY(-1px);
            background: linear-gradient(165deg, #153a9c 0%, #0f2a78 100%);
            box-shadow: 0 7px 16px rgba(0, 0, 0, 0.25);
        }
        .answer-button.selected {
            background: linear-gradient(135deg, #f4cb62 0%, #d6a43f 100%);
            color: #101f50;
            border-color: #f8df9b;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .actions button {
            border: 2px solid #f1d37a;
            background: linear-gradient(135deg, #f4cb62 0%, #d6a43f 100%);
            color: #132861;
            padding: 14px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s, filter 0.2s;
            border-radius: 10px;
            font-weight: 800;
            letter-spacing: 0.04em;
        }
        .actions button:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }
        .actions button:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .question-status {
            margin-top: 14px;
            font-size: 0.95rem;
            min-height: 1.3rem;
            color: #f3e7be;
            font-weight: 600;
        }
        .question-card.completion-mode {
            display: grid;
            grid-template-rows: 1fr 1fr;
            align-items: center;
            justify-items: center;
            min-height: 360px;
            text-align: center;
            padding: 16px;
        }
        .question-card.completion-mode .question-text {
            margin: 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5rem, 13vw, 8.4rem);
            letter-spacing: 0.04em;
            line-height: 0.9;
            color: #fff7d7;
            text-shadow: 0 0 16px rgba(246, 207, 99, 0.35);
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
        }
        .question-card.completion-mode .question-status {
            margin: 0;
            min-height: 0;
            font-size: clamp(1.8rem, 4vw, 3rem);
            line-height: 1.08;
            font-weight: 800;
            color: #f9e3a1;
            max-width: 100%;
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
        }
        body.correct {
            background: radial-gradient(circle at 20% 15%, #2f7b9e 0%, #164f6c 40%, #0b2f47 100%);
            color: #ffffff;
        }
        body.wrong {
            background: radial-gradient(circle at 20% 15%, #8c2740 0%, #5f1732 45%, #36081b 100%);
            color: #ffffff;
        }
        #wrongOverlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 5rem;
            font-weight: 800;
            color: rgba(255, 231, 173, 0.95);
            text-shadow: 0 0 16px rgba(0,0,0,0.4);
            pointer-events: none;
            z-index: 2;
        }
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 18px;
            opacity: 0.95;
            z-index: 2;
            animation: confetti-fall 1.6s ease-out forwards;
        }
        @keyframes confetti-fall {
            to {
                transform: translate3d(0, 120vh, 0) rotate(720deg);
                opacity: 0;
            }
        }
        @media (max-width: 520px) {
            .score-tracker {
                position: static;
                display: inline-block;
                margin: 0 0 14px;
                font-size: 1.3rem;
                padding: 8px 14px;
            }
            .container {
                padding: 16px;
            }
            .question-card {
                padding: 16px;
                min-height: auto;
            }
            .question-text {
                font-size: 1.05rem;
            }
            .actions {
                flex-wrap: wrap;
            }
            .actions button {
                flex: 1 1 auto;
                min-width: 110px;
            }
        }
        /* ── Intro Panel ───────────────────────────────── */
        .intro-panel {
            text-align: center;
        }
        .intro-banner {
            display: inline-block;
            background: linear-gradient(135deg, #f6cf63 0%, #c18f29 100%);
            color: #09173f;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(0.85rem, 2vw, 1rem);
            letter-spacing: 0.22em;
            padding: 6px 20px;
            border-radius: 4px;
            margin-bottom: 14px;
            text-transform: uppercase;
        }
        .intro-title {
            margin: 0 0 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.6rem, 8vw, 5rem);
            letter-spacing: 0.06em;
            color: #f6cf63;
            text-shadow: 0 0 28px rgba(246, 207, 99, 0.55), 2px 2px 0 #0a1a50;
            line-height: 1;
        }
        .intro-sub {
            color: #e6ddbf;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
            margin: 0 0 22px;
        }
        .intro-categories {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 0 auto 26px;
            max-width: 520px;
        }
        @media (max-width: 420px) {
            .intro-categories {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .category-tile {
            background: linear-gradient(165deg, #0e2b7f 0%, #091750 100%);
            border: 2px solid #b0892e;
            border-radius: 8px;
            padding: 14px 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(0.95rem, 2.2vw, 1.15rem);
            letter-spacing: 0.08em;
            color: #f6cf63;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
            user-select: none;
        }
        .category-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.4);
        }
        .category-tile.selected {
            background: linear-gradient(135deg, #f6cf63 0%, #c18f29 100%);
            color: #09173f;
            border-color: #fff7c0;
            box-shadow: 0 0 0 3px rgba(246,207,99,0.45), 0 6px 18px rgba(0,0,0,0.35);
            transform: translateY(-2px);
        }
        .begin-btn {
            background: linear-gradient(135deg, #f6cf63 0%, #c18f29 100%);
            color: #09173f;
            border: 2px solid rgba(255, 234, 174, 0.6);
            border-radius: 10px;
            padding: 16px 36px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .begin-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            filter: none;
            transform: none;
            box-shadow: none;
        }
        .begin-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
            box-shadow: 0 10px 28px rgba(0,0,0,0.5);
        }
        .game-shell {
            display: none;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="container">

        <div class="intro-panel" id="introPanel">
            <div class="intro-banner">Round One &mdash; Brain Games</div>
            <h2 class="intro-title">Trivia Challenge</h2>
            <p class="intro-sub">Pick a category, then step up to the podium</p>
            <div class="intro-categories">
                <div class="category-tile" data-category-id="17" data-category-name="Science &amp; Nature">🔬 Science &amp; Nature</div>
                <div class="category-tile" data-category-id="23" data-category-name="History">📜 History</div>
                <div class="category-tile" data-category-id="14" data-category-name="TV">📺 Television</div>
                <div class="category-tile" data-category-id="22" data-category-name="Geography">🌍 Geography</div>
                <div class="category-tile" data-category-id="21" data-category-name="Sports">🏆 Sports</div>
                <div class="category-tile" data-category-id="11" data-category-name="Film">🎬 Film</div>
                <div class="category-tile" data-category-id="12" data-category-name="Music">🎵 Music</div>
                <div class="category-tile" data-category-id="15" data-category-name="Video Games">🎮 Video Games</div>
                <div class="category-tile" data-category-id="27" data-category-name="Animals">🐾 Animals</div>
            </div>
            <button class="begin-btn" id="beginButton" disabled>Choose a Category</button>
        </div>

        <div class="game-shell" id="gameShell">
            <div class="score-tracker" id="scoreTracker">0/3</div>
            <div class="question-card">
                <div id="questionText" class="question-text">Loading trivia question...</div>
                <div id="answers" class="answers"></div>
                <div id="questionStatus" class="question-status"></div>
            </div>
            <div class="actions">
                <button id="completeButton" disabled>Submit Answer</button>
                <button id="nextButton" disabled>Next Question</button>
            </div>
        </div>
    </div>

    <script>
        const triviaApiBase = 'https://opentdb.com/api.php?amount=20&difficulty=easy&type=multiple';
        let selectedCategoryId = null;
        let triviaQuestions = [];
        let currentQuestion = null;
        let selectedAnswer = null;
        let correctCount = 0;
        const REQUIRED_CORRECT = 3;

        const questionText = document.getElementById('questionText');
        const answersElement = document.getElementById('answers');
        const questionStatus = document.getElementById('questionStatus');
        const questionCard = document.querySelector('.question-card');
        const completeButton = document.getElementById('completeButton');
        const nextButton = document.getElementById('nextButton');
        const scoreTracker = document.getElementById('scoreTracker');
        const progressBar = document.getElementById('progressBar');
        const introPanel = document.getElementById('introPanel');
        const gameShell = document.getElementById('gameShell');
        const beginButton = document.getElementById('beginButton');

        // Category tile selection
        document.querySelectorAll('.category-tile').forEach(tile => {
            tile.addEventListener('click', () => {
                document.querySelectorAll('.category-tile').forEach(t => t.classList.remove('selected'));
                tile.classList.add('selected');
                selectedCategoryId = tile.dataset.categoryId;
                const name = tile.dataset.categoryName;
                beginButton.disabled = false;
                beginButton.textContent = `Play ${name}`;
            });
        });

        beginButton.addEventListener('click', () => {
            if (!selectedCategoryId) return;
            introPanel.style.display = 'none';
            gameShell.style.display = 'block';
            loadTriviaQuestions();
        });

        function decodeHtml(text) {
            return new DOMParser().parseFromString(text, 'text/html').documentElement.textContent;
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function updateScore() {
            scoreTracker.textContent = `${correctCount}/${REQUIRED_CORRECT}`;
            const percentage = (correctCount / REQUIRED_CORRECT) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        async function loadTriviaQuestions() {
            try {
                const url = `${triviaApiBase}&category=${selectedCategoryId}`;
                const response = await fetch(url);
                const data = await response.json();
                if (!data.results || data.results.length === 0) {
                    questionText.textContent = 'No questions found for that category. Try a different one.';
                    return;
                }
                triviaQuestions = data.results.map(question => ({
                    question: decodeHtml(question.question),
                    correct_answer: decodeHtml(question.correct_answer),
                    answers: shuffle([question.correct_answer, ...question.incorrect_answers].map(decodeHtml))
                }));
                showNextQuestion();
            } catch (error) {
                questionText.textContent = 'Could not load trivia. Refresh to try again.';
                questionStatus.textContent = '';
            }
        }

        function showNextQuestion() {
            if (!triviaQuestions.length) {
                questionText.textContent = 'No trivia available. Refresh the page.';
                answersElement.innerHTML = '';
                return;
            }

            currentQuestion = triviaQuestions.shift();
            selectedAnswer = null;
            document.body.className = '';
            questionCard.classList.remove('completion-mode');
            removeWrongOverlay();
            questionText.textContent = currentQuestion.question;
            questionStatus.textContent = 'Select an answer and submit to check it.';
            answersElement.innerHTML = '';
            completeButton.disabled = true;
            nextButton.style.display = 'none';
            completeButton.style.display = 'inline-block';

            currentQuestion.answers.forEach(answer => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'answer-button';
                button.textContent = answer;
                button.addEventListener('click', () => {
                    selectedAnswer = answer;
                    Array.from(answersElement.children).forEach(child => child.classList.remove('selected'));
                    button.classList.add('selected');
                    completeButton.disabled = false;
                });
                answersElement.appendChild(button);
            });
        }

        function showConfetti() {
            const count = 50;
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = `${Math.random() * 100}%`;
                const confettiPalette = ['#f6cf63', '#d6a43f', '#ffffff', '#1f4ab2', '#0d2f84'];
                confetti.style.background = confettiPalette[Math.floor(Math.random() * confettiPalette.length)];
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                confetti.style.animationDelay = `${Math.random() * 0.4}s`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        function createWrongOverlay() {
            const overlay = document.createElement('div');
            overlay.id = 'wrongOverlay';
            overlay.textContent = 'WRONG';
            document.body.appendChild(overlay);
        }

        function removeWrongOverlay() {
            const existing = document.getElementById('wrongOverlay');
            if (existing) existing.remove();
        }

        function showCompletionScreen() {
            questionText.textContent = '🎉 You Won!';
            answersElement.innerHTML = '';
            questionStatus.textContent = 'Ready for the next challenge?';
            questionCard.classList.add('completion-mode');
            completeButton.style.display = 'none';
            nextButton.style.display = 'inline-block';
            nextButton.disabled = false;
            if (sessionStorage.getItem('fromMoreGames')) {
                nextButton.textContent = '↩ More Games';
                const playAgainBtn = document.createElement('button');
                playAgainBtn.textContent = '🔄 Play Again';
                playAgainBtn.className = nextButton.className;
                playAgainBtn.onclick = () => window.location.reload();
                nextButton.insertAdjacentElement('afterend', playAgainBtn);
            } else {
                nextButton.textContent = 'Play Hangman →';
            }
            document.body.className = 'correct';
            showConfetti();
        }

        completeButton.addEventListener('click', () => {
            if (!selectedAnswer) {
                questionStatus.textContent = 'Choose an answer first.';
                return;
            }

            completeButton.disabled = true;
            Array.from(answersElement.children).forEach(button => button.disabled = true);

            if (selectedAnswer === currentQuestion.correct_answer) {
                correctCount++;
                updateScore();
                document.body.className = 'correct';
                questionStatus.textContent = 'Correct! 🎯';
                showConfetti();

                if (correctCount >= REQUIRED_CORRECT) {
                    setTimeout(showCompletionScreen, 2000);
                } else {
                    setTimeout(showNextQuestion, 2500);
                }
            } else {
                document.body.className = 'wrong';
                questionStatus.textContent = `Incorrect. Correct answer: ${currentQuestion.correct_answer}`;
                createWrongOverlay();
                setTimeout(() => {
                    showNextQuestion();
                }, 2500);
            }
        });

        nextButton.addEventListener('click', () => {
            if (correctCount >= REQUIRED_CORRECT) {
                if (sessionStorage.getItem('fromMoreGames')) {
                    sessionStorage.removeItem('fromMoreGames');
                    window.location.href = 'moregames.html';
                } else {
                    window.location.href = 'roundtwo.html';
                }
            } else {
                showNextQuestion();
            }
        });

        updateScore();
    </script>
</body>
</html>
