<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Games - Trivia Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Source Sans 3', sans-serif;
            background:
                radial-gradient(circle at 20% 15%, #2449ad 0%, #132b73 35%, #07143d 70%, #040b24 100%);
            color: #f8f6ea;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            transition: background 0.5s ease;
        }
        .container {
            width: 100%;
            max-width: 760px;
            border: 4px solid #caa449;
            padding: 28px;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45), inset 0 0 0 2px rgba(243, 214, 123, 0.45);
            background: linear-gradient(165deg, rgba(14, 35, 98, 0.95) 0%, rgba(9, 24, 71, 0.94) 100%);
            position: relative;
            z-index: 1;
            border-radius: 16px;
        }
        h1 {
            margin: 0 0 18px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.4rem;
            letter-spacing: 0.08em;
            color: #f6cf63;
            text-shadow: 0 0 14px rgba(245, 197, 80, 0.35);
        }
        .subtitle {
            margin: 0 0 24px;
            color: #e6ddbf;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .score-tracker {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f6cf63 0%, #c18f29 100%);
            color: #09173f;
            padding: 10px 18px;
            border-radius: 10px;
            border: 2px solid rgba(255, 234, 174, 0.6);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        }
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: linear-gradient(90deg, #f6cf63, #e6b63f, #b98223);
            width: 0%;
            transition: width 0.6s ease;
            z-index: 10;
            border-radius: 0 10px 10px 0;
        }
        .question-card {
            border: 2px solid rgba(252, 226, 157, 0.6);
            padding: 28px;
            background: linear-gradient(180deg, rgba(21, 47, 122, 0.78) 0%, rgba(15, 36, 95, 0.78) 100%);
            min-height: 260px;
            border-radius: 12px;
            box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.3);
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 24px;
            line-height: 1.4;
            color: #fff9df;
        }
        .answers {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .answer-button {
            border: 2px solid #b0892e;
            background: linear-gradient(165deg, #0e2b7f 0%, #0b2267 100%);
            color: #f9f1d1;
            padding: 16px 18px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: transform 0.15s, background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
            border-radius: 10px;
            font-weight: 700;
        }
        .answer-button:hover {
            transform: translateY(-1px);
            background: linear-gradient(165deg, #153a9c 0%, #0f2a78 100%);
            box-shadow: 0 7px 16px rgba(0, 0, 0, 0.25);
        }
        .answer-button.selected {
            background: linear-gradient(135deg, #f4cb62 0%, #d6a43f 100%);
            color: #101f50;
            border-color: #f8df9b;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .actions button {
            border: 2px solid #f1d37a;
            background: linear-gradient(135deg, #f4cb62 0%, #d6a43f 100%);
            color: #132861;
            padding: 14px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s, filter 0.2s;
            border-radius: 10px;
            font-weight: 800;
            letter-spacing: 0.04em;
        }
        .actions button:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }
        .actions button:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .question-status {
            margin-top: 14px;
            font-size: 0.95rem;
            min-height: 1.3rem;
            color: #f3e7be;
            font-weight: 600;
        }
        .question-card.completion-mode {
            display: grid;
            grid-template-rows: 1fr 1fr;
            align-items: center;
            justify-items: center;
            min-height: 360px;
            text-align: center;
            padding: 16px;
        }
        .question-card.completion-mode .question-text {
            margin: 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5rem, 13vw, 8.4rem);
            letter-spacing: 0.04em;
            line-height: 0.9;
            color: #fff7d7;
            text-shadow: 0 0 16px rgba(246, 207, 99, 0.35);
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
        }
        .question-card.completion-mode .question-status {
            margin: 0;
            min-height: 0;
            font-size: clamp(1.8rem, 4vw, 3rem);
            line-height: 1.08;
            font-weight: 800;
            color: #f9e3a1;
            max-width: 100%;
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
        }
        body.correct {
            background: radial-gradient(circle at 20% 15%, #2f7b9e 0%, #164f6c 40%, #0b2f47 100%);
            color: #ffffff;
        }
        body.wrong {
            background: radial-gradient(circle at 20% 15%, #8c2740 0%, #5f1732 45%, #36081b 100%);
            color: #ffffff;
        }
        #wrongOverlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 5rem;
            font-weight: 800;
            color: rgba(255, 231, 173, 0.95);
            text-shadow: 0 0 16px rgba(0,0,0,0.4);
            pointer-events: none;
            z-index: 2;
        }
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 18px;
            opacity: 0.95;
            z-index: 2;
            animation: confetti-fall 1.6s ease-out forwards;
        }
        @keyframes confetti-fall {
            to {
                transform: translate3d(0, 120vh, 0) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="container">
        <div class="score-tracker" id="scoreTracker">0/3</div>
        <h1>Trivia Challenge</h1>
        <p class="subtitle">Answer the question correctly to win.</p>

        <div class="question-card">
            <div id="questionText" class="question-text">Loading trivia question...</div>
            <div id="answers" class="answers"></div>
            <div id="questionStatus" class="question-status"></div>
        </div>

        <div class="actions">
            <button id="completeButton" disabled>Submit Answer</button>
            <button id="nextButton" disabled>Next Question</button>
        </div>
    </div>

    <script>
        const triviaApiUrl = 'https://opentdb.com/api.php?amount=50&difficulty=easy&type=multiple';
        let triviaQuestions = [];
        let currentQuestion = null;
        let selectedAnswer = null;
        let correctCount = 0;
        const REQUIRED_CORRECT = 3;

        const questionText = document.getElementById('questionText');
        const answersElement = document.getElementById('answers');
        const questionStatus = document.getElementById('questionStatus');
        const questionCard = document.querySelector('.question-card');
        const completeButton = document.getElementById('completeButton');
        const nextButton = document.getElementById('nextButton');
        const scoreTracker = document.getElementById('scoreTracker');
        const progressBar = document.getElementById('progressBar');

        function decodeHtml(text) {
            return new DOMParser().parseFromString(text, 'text/html').documentElement.textContent;
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function updateScore() {
            scoreTracker.textContent = `${correctCount}/${REQUIRED_CORRECT}`;
            const percentage = (correctCount / REQUIRED_CORRECT) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        async function loadTriviaQuestions() {
            try {
                const response = await fetch(triviaApiUrl);
                const data = await response.json();
                triviaQuestions = data.results.map(question => ({
                    question: decodeHtml(question.question),
                    correct_answer: decodeHtml(question.correct_answer),
                    answers: shuffle([question.correct_answer, ...question.incorrect_answers].map(decodeHtml))
                }));
                showNextQuestion();
            } catch (error) {
                questionText.textContent = 'Could not load trivia. Refresh to try again.';
                questionStatus.textContent = '';
            }
        }

        function showNextQuestion() {
            if (!triviaQuestions.length) {
                questionText.textContent = 'No trivia available. Refresh the page.';
                answersElement.innerHTML = '';
                return;
            }

            currentQuestion = triviaQuestions.shift();
            selectedAnswer = null;
            document.body.className = '';
            questionCard.classList.remove('completion-mode');
            removeWrongOverlay();
            questionText.textContent = currentQuestion.question;
            questionStatus.textContent = 'Select an answer and submit to check it.';
            answersElement.innerHTML = '';
            completeButton.disabled = true;
            nextButton.style.display = 'none';
            completeButton.style.display = 'inline-block';

            currentQuestion.answers.forEach(answer => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'answer-button';
                button.textContent = answer;
                button.addEventListener('click', () => {
                    selectedAnswer = answer;
                    Array.from(answersElement.children).forEach(child => child.classList.remove('selected'));
                    button.classList.add('selected');
                    completeButton.disabled = false;
                });
                answersElement.appendChild(button);
            });
        }

        function showConfetti() {
            const count = 50;
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = `${Math.random() * 100}%`;
                const confettiPalette = ['#f6cf63', '#d6a43f', '#ffffff', '#1f4ab2', '#0d2f84'];
                confetti.style.background = confettiPalette[Math.floor(Math.random() * confettiPalette.length)];
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                confetti.style.animationDelay = `${Math.random() * 0.4}s`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        function createWrongOverlay() {
            const overlay = document.createElement('div');
            overlay.id = 'wrongOverlay';
            overlay.textContent = 'WRONG';
            document.body.appendChild(overlay);
        }

        function removeWrongOverlay() {
            const existing = document.getElementById('wrongOverlay');
            if (existing) existing.remove();
        }

        function showCompletionScreen() {
            questionText.textContent = '🎉 You Won!';
            answersElement.innerHTML = '';
            questionStatus.textContent = 'Ready for the next challenge?';
            questionCard.classList.add('completion-mode');
            completeButton.style.display = 'none';
            nextButton.style.display = 'inline-block';
            nextButton.disabled = false;
            if (sessionStorage.getItem('fromMoreGames')) {
                nextButton.textContent = '↩ More Games';
                const playAgainBtn = document.createElement('button');
                playAgainBtn.textContent = '🔄 Play Again';
                playAgainBtn.className = nextButton.className;
                playAgainBtn.onclick = () => window.location.reload();
                nextButton.insertAdjacentElement('afterend', playAgainBtn);
            } else {
                nextButton.textContent = 'Play Hangman →';
            }
            document.body.className = 'correct';
            showConfetti();
        }

        completeButton.addEventListener('click', () => {
            if (!selectedAnswer) {
                questionStatus.textContent = 'Choose an answer first.';
                return;
            }

            completeButton.disabled = true;
            Array.from(answersElement.children).forEach(button => button.disabled = true);

            if (selectedAnswer === currentQuestion.correct_answer) {
                correctCount++;
                updateScore();
                document.body.className = 'correct';
                questionStatus.textContent = 'Correct! 🎯';
                showConfetti();

                if (correctCount >= REQUIRED_CORRECT) {
                    setTimeout(showCompletionScreen, 2000);
                } else {
                    setTimeout(showNextQuestion, 2500);
                }
            } else {
                document.body.className = 'wrong';
                questionStatus.textContent = `Incorrect. Correct answer: ${currentQuestion.correct_answer}`;
                createWrongOverlay();
                setTimeout(() => {
                    showNextQuestion();
                }, 2500);
            }
        });

        nextButton.addEventListener('click', () => {
            if (correctCount >= REQUIRED_CORRECT) {
                if (sessionStorage.getItem('fromMoreGames')) {
                    sessionStorage.removeItem('fromMoreGames');
                    window.location.href = 'moregames.html';
                } else {
                    window.location.href = 'roundtwo.html';
                }
            } else {
                showNextQuestion();
            }
        });

        loadTriviaQuestions();
        updateScore();
    </script>
</body>
</html>
