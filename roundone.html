<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Games - Trivia Challenge</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #121212;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            transition: background 0.5s ease;
        }
        .container {
            width: 100%;
            max-width: 760px;
            border: 2px solid #121212;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.95);
            position: relative;
            z-index: 1;
        }
        h1 {
            margin: 0 0 18px;
            font-size: 2.4rem;
            letter-spacing: 0.08em;
        }
        .subtitle {
            margin: 0 0 24px;
            color: #444;
            font-size: 1rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .score-tracker {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 1.8rem;
            font-weight: 800;
            background: #121212;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
        }
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff3b30, #ffcc00, #30d158);
            width: 0%;
            transition: width 0.6s ease;
            z-index: 10;
        }
        .question-card {
            border: 2px solid #121212;
            padding: 28px;
            background: #ffffff;
            min-height: 260px;
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 24px;
            line-height: 1.4;
        }
        .answers {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .answer-button {
            border: 2px solid #121212;
            background: #ffffff;
            color: #121212;
            padding: 16px 18px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: transform 0.15s, background 0.2s, color 0.2s, border-color 0.2s;
        }
        .answer-button:hover {
            transform: translateY(-1px);
            background: #f7f7f7;
        }
        .answer-button.selected {
            background: #121212;
            color: #ffffff;
            border-color: #121212;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .actions button {
            border: 2px solid #121212;
            background: #121212;
            color: #ffffff;
            padding: 14px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        .actions button:hover:not(:disabled) {
            transform: translateY(-1px);
        }
        .actions button:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .question-status {
            margin-top: 14px;
            font-size: 0.95rem;
            min-height: 1.3rem;
        }
        body.correct {
            background: #30d158;
            color: #ffffff;
        }
        body.wrong {
            background: #ff3b30;
            color: #ffffff;
        }
        #wrongOverlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 5rem;
            font-weight: 800;
            color: rgba(255,255,255,0.95);
            text-shadow: 0 0 16px rgba(0,0,0,0.4);
            pointer-events: none;
            z-index: 2;
        }
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 18px;
            opacity: 0.95;
            z-index: 2;
            animation: confetti-fall 1.6s ease-out forwards;
        }
        @keyframes confetti-fall {
            to {
                transform: translate3d(0, 120vh, 0) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="container">
        <div class="score-tracker" id="scoreTracker">0/3</div>
        <h1>Trivia Challenge</h1>
        <p class="subtitle">Answer the question correctly to win.</p>

        <div class="question-card">
            <div id="questionText" class="question-text">Loading trivia question...</div>
            <div id="answers" class="answers"></div>
            <div id="questionStatus" class="question-status"></div>
        </div>

        <div class="actions">
            <button id="completeButton" disabled>Submit Answer</button>
            <button id="nextButton" disabled>Next Question</button>
        </div>
    </div>

    <script>
        const triviaApiUrl = 'https://opentdb.com/api.php?amount=50&difficulty=easy&type=multiple';
        let triviaQuestions = [];
        let currentQuestion = null;
        let selectedAnswer = null;
        let correctCount = 0;
        const REQUIRED_CORRECT = 3;

        const questionText = document.getElementById('questionText');
        const answersElement = document.getElementById('answers');
        const questionStatus = document.getElementById('questionStatus');
        const completeButton = document.getElementById('completeButton');
        const nextButton = document.getElementById('nextButton');
        const scoreTracker = document.getElementById('scoreTracker');
        const progressBar = document.getElementById('progressBar');

        function decodeHtml(text) {
            return new DOMParser().parseFromString(text, 'text/html').documentElement.textContent;
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function updateScore() {
            scoreTracker.textContent = `${correctCount}/${REQUIRED_CORRECT}`;
            const percentage = (correctCount / REQUIRED_CORRECT) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        async function loadTriviaQuestions() {
            try {
                const response = await fetch(triviaApiUrl);
                const data = await response.json();
                triviaQuestions = data.results.map(question => ({
                    question: decodeHtml(question.question),
                    correct_answer: decodeHtml(question.correct_answer),
                    answers: shuffle([question.correct_answer, ...question.incorrect_answers].map(decodeHtml))
                }));
                showNextQuestion();
            } catch (error) {
                questionText.textContent = 'Could not load trivia. Refresh to try again.';
                questionStatus.textContent = '';
            }
        }

        function showNextQuestion() {
            if (!triviaQuestions.length) {
                questionText.textContent = 'No trivia available. Refresh the page.';
                answersElement.innerHTML = '';
                return;
            }

            currentQuestion = triviaQuestions.shift();
            selectedAnswer = null;
            document.body.className = '';
            removeWrongOverlay();
            questionText.textContent = currentQuestion.question;
            questionStatus.textContent = 'Select an answer and submit to check it.';
            answersElement.innerHTML = '';
            completeButton.disabled = true;
            nextButton.style.display = 'none';
            completeButton.style.display = 'inline-block';

            currentQuestion.answers.forEach(answer => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'answer-button';
                button.textContent = answer;
                button.addEventListener('click', () => {
                    selectedAnswer = answer;
                    Array.from(answersElement.children).forEach(child => child.classList.remove('selected'));
                    button.classList.add('selected');
                    completeButton.disabled = false;
                });
                answersElement.appendChild(button);
            });
        }

        function showConfetti() {
            const count = 50;
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.background = `hsl(${Math.random() * 120 + 120}, 95%, 60%)`;
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                confetti.style.animationDelay = `${Math.random() * 0.4}s`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        function createWrongOverlay() {
            const overlay = document.createElement('div');
            overlay.id = 'wrongOverlay';
            overlay.textContent = 'WRONG';
            document.body.appendChild(overlay);
        }

        function removeWrongOverlay() {
            const existing = document.getElementById('wrongOverlay');
            if (existing) existing.remove();
        }

        function showCompletionScreen() {
            questionText.textContent = '🎉 You Won!';
            answersElement.innerHTML = '';
            questionStatus.textContent = 'You answered 3 questions correctly. Ready for the next challenge?';
            completeButton.style.display = 'none';
            nextButton.style.display = 'inline-block';
            nextButton.disabled = false;
            nextButton.textContent = 'Play Hangman →';
            document.body.className = 'correct';
            showConfetti();
        }

        completeButton.addEventListener('click', () => {
            if (!selectedAnswer) {
                questionStatus.textContent = 'Choose an answer first.';
                return;
            }

            completeButton.disabled = true;
            Array.from(answersElement.children).forEach(button => button.disabled = true);

            if (selectedAnswer === currentQuestion.correct_answer) {
                correctCount++;
                updateScore();
                document.body.className = 'correct';
                questionStatus.textContent = 'Correct! 🎯';
                showConfetti();

                if (correctCount >= REQUIRED_CORRECT) {
                    setTimeout(showCompletionScreen, 2000);
                } else {
                    setTimeout(showNextQuestion, 2500);
                }
            } else {
                document.body.className = 'wrong';
                questionStatus.textContent = 'Incorrect. Try the next one.';
                createWrongOverlay();
                setTimeout(() => {
                    showNextQuestion();
                }, 2500);
            }
        });

        nextButton.addEventListener('click', () => {
            if (correctCount >= REQUIRED_CORRECT) {
                window.location.href = 'roundtwo.html';
            } else {
                showNextQuestion();
            }
        });

        loadTriviaQuestions();
        updateScore();
    </script>
</body>
</html>
