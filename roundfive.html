<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Brain Games - Round Five: Riddle Finale</title>
	<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Bangers&display=swap" rel="stylesheet">
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Baloo 2', cursive;
			background:
				radial-gradient(circle at center, #ffd84d 0%, #ffd84d 14%, #f9931f 14%, #f9931f 26%, #e34a26 26%, #e34a26 38%, #b7262e 38%, #b7262e 52%, #6b1220 52%, #6b1220 100%);
			color: #3b1f11;
		}

		.page {
			width: min(900px, 100%);
			padding: 20px;
			box-sizing: border-box;
		}

		.card {
			background: rgba(255, 248, 220, 0.97);
			border: 4px solid #2b1a0d;
			border-radius: 26px;
			box-shadow: 0 20px 0 #2b1a0d, 0 24px 45px rgba(0, 0, 0, 0.34);
			padding: 24px;
			position: relative;
		}

		.card::before {
			content: '';
			position: absolute;
			inset: 10px;
			border: 2px dashed #f05d2c;
			border-radius: 18px;
			pointer-events: none;
		}

		h1 {
			margin: 0 0 10px;
			font-family: 'Bangers', cursive;
			font-size: clamp(2.4rem, 4.6vw, 4.2rem);
			text-align: center;
			letter-spacing: 0.08em;
			color: #ffcf3f;
			text-shadow: -2px -2px 0 #2b1a0d, 2px -2px 0 #2b1a0d, -2px 2px 0 #2b1a0d, 2px 2px 0 #2b1a0d;
			animation: toon-wobble 2.2s ease-in-out infinite;
		}

		.subtitle {
			margin: 0 0 16px;
			text-align: center;
			color: #4f2f16;
			line-height: 1.5;
		}

		.top-bar {
			display: flex;
			justify-content: space-between;
			gap: 12px;
			flex-wrap: wrap;
			margin-bottom: 14px;
			font-weight: 800;
			color: #2b1a0d;
			font-size: 1.05rem;
		}

		.riddle-box {
			background: #fff3cd;
			border: 3px solid #2b1a0d;
			border-radius: 14px;
			min-height: 120px;
			padding: 16px;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			line-height: 1.6;
			font-size: clamp(1rem, 1.8vw, 1.2rem);
			margin-bottom: 14px;
			box-shadow: inset 0 -6px 0 rgba(0, 0, 0, 0.08);
		}

		.answer-row {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 10px;
			margin-bottom: 12px;
		}

		input[type="text"] {
			padding: 12px 14px;
			border-radius: 12px;
			border: 3px solid #2b1a0d;
			font-size: 1rem;
			font-family: inherit;
			outline: none;
			background: #fffdf3;
		}

		input[type="text"]:focus {
			border-color: #f05d2c;
			box-shadow: 0 0 0 4px rgba(240, 93, 44, 0.2);
		}

		button {
			border: 3px solid #2b1a0d;
			border-radius: 12px;
			padding: 11px 16px;
			font-family: inherit;
			font-size: 1rem;
			font-weight: 800;
			cursor: pointer;
			background: linear-gradient(180deg, #7ce0ff 0%, #3bb2de 100%);
			color: #1a1a1a;
			transition: transform 0.15s ease, filter 0.2s ease;
			box-shadow: 0 4px 0 #2b1a0d;
		}

		button:hover {
			transform: translateY(-2px);
			filter: brightness(1.06);
		}

		button:disabled {
			opacity: 0.55;
			cursor: not-allowed;
			transform: none;
			filter: none;
		}

		.controls {
			display: flex;
			justify-content: center;
			gap: 10px;
			flex-wrap: wrap;
		}

		.intro-panel {
			border: 4px solid #2b1a0d;
			border-radius: 18px;
			padding: 28px 24px 24px;
			background: linear-gradient(165deg, #ffd84d 0%, #f9931f 45%, #e34a26 100%);
			margin-bottom: 14px;
			text-align: center;
			box-shadow: 0 8px 0 #2b1a0d, 0 12px 30px rgba(0,0,0,0.3);
			position: relative;
			overflow: hidden;
		}
		.intro-panel::before {
			content: '';
			position: absolute;
			inset: 10px;
			border: 2px dashed rgba(43,26,13,0.35);
			border-radius: 10px;
			pointer-events: none;
		}
		.intro-bang {
			font-family: 'Bangers', cursive;
			font-size: clamp(1rem, 3vw, 1.3rem);
			letter-spacing: 0.18em;
			color: #fff7d4;
			text-shadow: -1px -1px 0 #2b1a0d, 1px -1px 0 #2b1a0d, -1px 1px 0 #2b1a0d, 1px 1px 0 #2b1a0d;
			margin-bottom: 10px;
		}

		.intro-title {
			margin: 0 0 10px;
			font-family: 'Bangers', cursive;
			font-size: clamp(2.4rem, 6vw, 3.6rem);
			letter-spacing: 0.08em;
			color: #fff7d4;
			text-shadow: -2px -2px 0 #2b1a0d, 2px -2px 0 #2b1a0d, -2px 2px 0 #2b1a0d, 2px 2px 0 #2b1a0d;
			text-transform: uppercase;
			position: relative;
			z-index: 1;
		}
		.intro-desc {
			margin: 0 0 14px;
			color: #2b1a0d;
			font-size: 0.97rem;
			line-height: 1.6;
			font-weight: 700;
			position: relative;
			z-index: 1;
		}
		.toon-cast {
			font-size: clamp(1.4rem, 4vw, 1.9rem);
			letter-spacing: 0.1em;
			margin: 0 0 16px;
			position: relative;
			z-index: 1;
		}

		.game-shell {
			display: none;
		}

		.status {
			min-height: 26px;
			text-align: center;
			margin: 8px 0 14px;
			font-weight: 700;
		}

		.status.success {
			color: #1b7f3e;
		}

		.status.error {
			color: #bc2e1f;
		}

		.answer-reveal {
			text-align: center;
			margin-bottom: 12px;
			color: #4f2f16;
			font-weight: 700;
			min-height: 24px;
		}

		#startButton {
			background: linear-gradient(180deg, #ff6b4a 0%, #ef3f28 100%);
			color: #fff7d4;
		}

		@keyframes toon-wobble {
			0%,
			100% { transform: rotate(-1.5deg) scale(1); }
			50% { transform: rotate(1.5deg) scale(1.03); }
		}

		@media (max-width: 700px) {
			.answer-row {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="page">
		<div class="card">
			<h1>Round Five</h1>

			<div class="intro-panel" id="introPanel">
				<div class="intro-bang">💥 ACME BRAIN BUSTER — ROUND FIVE 💥</div>
				<h2 class="intro-title">Riddle Me This!</h2>
				<div class="toon-cast">🐰 🐦 🐷 🦆 🐱 💣</div>
				<p class="intro-desc">The ACME Brain Buster is primed and ready. Answer enough riddles to survive Round Five—or get flattened by a 10-ton weight. Th-th-th-that’s all, folks… if you fail!</p>
				<div class="controls">
					<button id="startButton">I'm Ready, Doc!</button>
				</div>
			</div>

			<div class="game-shell" id="gameShell">
				<div class="top-bar">
					<span id="progressText">Riddles Attempted: 0</span>
					<span id="scoreText">Score: 0</span>
				</div>

				<div class="riddle-box" id="riddleText">Loading riddle...</div>

				<div class="answer-row">
					<input type="text" id="answerInput" placeholder="Type your answer" autocomplete="off" disabled>
					<button id="submitButton" disabled>Submit</button>
				</div>

				<div class="status" id="statusText"></div>
				<div class="answer-reveal" id="answerReveal"></div>

				<div class="controls">
					<button id="nextButton" disabled>Next Riddle</button>
					<button id="restartButton" style="display:none;">Play Again</button>
					<button id="homeButton" style="display:none;">Back To Cover</button>
				</div>
			</div>
		</div>
	</div>

	<script>
		const PASS_SCORE = 1;

		const progressText = document.getElementById('progressText');
		const scoreText = document.getElementById('scoreText');
		const riddleText = document.getElementById('riddleText');
		const answerInput = document.getElementById('answerInput');
		const submitButton = document.getElementById('submitButton');
		const statusText = document.getElementById('statusText');
		const answerReveal = document.getElementById('answerReveal');
		const startButton = document.getElementById('startButton');
		const nextButton = document.getElementById('nextButton');
		const restartButton = document.getElementById('restartButton');
		const homeButton = document.getElementById('homeButton');
		const introPanel = document.getElementById('introPanel');
		const gameShell = document.getElementById('gameShell');

		let score = 0;
		let currentIndex = 0;
		let currentRiddle = null;
		let gameStarted = false;

		const endpointCandidates = [
			'https://riddles-api-eight.vercel.app/logic',
			'https://riddles-api-eight.vercel.app/funny',
			'https://riddles-api-eight.vercel.app/%7B',
			'https://riddles-api-eight.vercel.app/random',
			'https://riddles-api-eight.vercel.app/api/random',
			'https://riddles-api-eight.vercel.app/'
		];

		function sanitize(text) {
			return String(text || '').trim().toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ');
		}

		function normalizeForCompare(text) {
			return sanitize(text).replace(/^(a|an|the)\s+/, '').trim();
		}

		function levenshteinDistance(a, b) {
			const rows = a.length + 1;
			const cols = b.length + 1;
			const dp = Array.from({ length: rows }, () => Array(cols).fill(0));

			for (let i = 0; i < rows; i++) dp[i][0] = i;
			for (let j = 0; j < cols; j++) dp[0][j] = j;

			for (let i = 1; i < rows; i++) {
				for (let j = 1; j < cols; j++) {
					const cost = a[i - 1] === b[j - 1] ? 0 : 1;
					dp[i][j] = Math.min(
						dp[i - 1][j] + 1,
						dp[i][j - 1] + 1,
						dp[i - 1][j - 1] + cost
					);
				}
			}

			return dp[a.length][b.length];
		}

		function tokenOverlapScore(a, b) {
			const tokensA = new Set(a.split(' ').filter(Boolean));
			const tokensB = new Set(b.split(' ').filter(Boolean));
			if (tokensA.size === 0 || tokensB.size === 0) {
				return 0;
			}

			let overlap = 0;
			for (const token of tokensA) {
				if (tokensB.has(token)) {
					overlap += 1;
				}
			}

			return overlap / Math.max(tokensA.size, tokensB.size);
		}

		function hasKeywordMatch(a, b) {
			const stopWords = new Set(['a', 'an', 'the', 'and', 'or', 'of', 'to', 'in', 'on', 'at', 'for', 'with']);
			const tokensA = new Set(a.split(' ').filter((token) => token && !stopWords.has(token)));
			const tokensB = new Set(b.split(' ').filter((token) => token && !stopWords.has(token)));

			for (const token of tokensA) {
				if (tokensB.has(token)) {
					return true;
				}
			}

			return false;
		}

		function isAnswerSimilar(userInput, expectedAnswer) {
			const user = normalizeForCompare(userInput);
			const expected = normalizeForCompare(expectedAnswer);

			if (!user || !expected) {
				return false;
			}

			if (user === expected) {
				return true;
			}

			if ((user.length >= 3 && expected.includes(user)) || (expected.length >= 3 && user.includes(expected))) {
				return true;
			}

			if (hasKeywordMatch(user, expected)) {
				return true;
			}

			if (tokenOverlapScore(user, expected) >= 0.5) {
				return true;
			}

			const maxLen = Math.max(user.length, expected.length);
			const similarity = 1 - (levenshteinDistance(user, expected) / maxLen);
			return similarity >= 0.72;
		}

		function parseRiddlePayload(payload) {
			let item = payload;

			if (Array.isArray(payload) && payload.length > 0) {
				item = payload[Math.floor(Math.random() * payload.length)];
			}

			if (item && item.riddle && item.answer) {
				return { riddle: item.riddle, answer: item.answer };
			}

			if (item && item.question && item.answer) {
				return { riddle: item.question, answer: item.answer };
			}

			if (item && item.data && item.data.riddle && item.data.answer) {
				return { riddle: item.data.riddle, answer: item.data.answer };
			}

			return null;
		}

		async function fetchRiddle() {
			let lastError = 'Unknown API error';

			for (const url of endpointCandidates) {
				try {
					const response = await fetch(url, { cache: 'no-store' });
					if (!response.ok) {
						lastError = `${response.status} ${response.statusText}`;
						continue;
					}

					const payload = await response.json();
					const parsed = parseRiddlePayload(payload);
					if (parsed) {
						return parsed;
					}

					lastError = 'Unexpected response shape';
				} catch (error) {
					lastError = error.message;
				}
			}

			throw new Error(lastError);
		}

		function updateHud() {
			progressText.textContent = `Riddles Attempted: ${currentIndex}`;
			scoreText.textContent = `Score: ${score}`;
		}

		function lockAnswering() {
			answerInput.disabled = true;
			submitButton.disabled = true;
		}

		function unlockAnswering() {
			answerInput.disabled = false;
			submitButton.disabled = false;
			answerInput.focus();
		}

		async function loadNextRiddle() {
			lockAnswering();
			nextButton.disabled = true;
			statusText.className = 'status';
			statusText.textContent = 'Fetching riddle...';
			answerReveal.textContent = '';
			answerInput.value = '';

			try {
				currentRiddle = await fetchRiddle();
				currentIndex += 1;
				updateHud();
				riddleText.textContent = currentRiddle.riddle;
				statusText.textContent = 'Solve it and submit your answer.';
				unlockAnswering();
			} catch (error) {
				statusText.textContent = `Could not load riddle: ${error.message}. Try again.`;
				statusText.className = 'status error';
			}
		}

		function finishGame(passed) {
			lockAnswering();
			nextButton.disabled = true;
			statusText.className = passed ? 'status success' : 'status error';
			statusText.textContent = `Final Score: ${score}`;
			answerReveal.textContent = passed
				? 'You passed Round Five and finished Brain Games!'
				: 'You did not pass this round yet. Try again!';

			if (passed) {
				if (sessionStorage.getItem('fromMoreGames')) {
					sessionStorage.removeItem('fromMoreGames');
					restartButton.style.display = 'inline-block';
					const moreGamesBtn = document.createElement('button');
					moreGamesBtn.textContent = '↩ More Games';
					moreGamesBtn.onclick = () => window.location.href = 'moregames.html';
					restartButton.insertAdjacentElement('afterend', moreGamesBtn);
				} else {
					setTimeout(() => {
						window.location.href = 'ending.html';
					}, 1000);
				}
				return;
			}

			restartButton.style.display = 'inline-block';
			homeButton.style.display = 'inline-block';
		}

		function checkAnswer() {
			if (!currentRiddle) {
				return;
			}

			const user = sanitize(answerInput.value);

			if (!user) {
				statusText.textContent = 'Enter an answer first.';
				statusText.className = 'status error';
				return;
			}

			const isCorrect = isAnswerSimilar(user, currentRiddle.answer);

			if (isCorrect) {
				score += 1;
				statusText.textContent = 'Correct!';
				statusText.className = 'status success';
			} else {
				statusText.textContent = 'Not quite.';
				statusText.className = 'status error';
			}

			answerReveal.textContent = `Answer: ${currentRiddle.answer}`;
			updateHud();
			lockAnswering();

			if (score >= PASS_SCORE) {
				setTimeout(() => finishGame(true), 800);
			} else {
				setTimeout(loadNextRiddle, 900);
			}
		}

		function resetGame() {
			score = 0;
			currentIndex = 0;
			currentRiddle = null;
			gameStarted = true;
			restartButton.style.display = 'none';
			homeButton.style.display = 'none';
			nextButton.style.display = 'none';
			updateHud();
			loadNextRiddle();
		}

		startButton.addEventListener('click', () => {
			introPanel.style.display = 'none';
			gameShell.style.display = 'block';
			resetGame();
		});
		restartButton.addEventListener('click', resetGame);
		nextButton.addEventListener('click', loadNextRiddle);
		homeButton.addEventListener('click', () => {
			window.location.href = 'coverpage.html';
		});
		submitButton.addEventListener('click', checkAnswer);
		answerInput.addEventListener('keypress', (event) => {
			if (event.key === 'Enter' && !submitButton.disabled) {
				checkAnswer();
			}
		});

		updateHud();
	</script>
</body>
</html>
