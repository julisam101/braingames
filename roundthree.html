<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Games - Round Three: Math Sprint</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #ffe6f4 0%, #dfe7ee 100%);
            color: #2f2a29;
        }
        .page {
            width: min(760px, 100%);
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: rgba(255,255,255,0.88);
            border: 2px solid rgba(196, 167, 222, 0.5);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(179, 150, 195, 0.25);
            padding: 24px;
            backdrop-filter: blur(12px);
            text-align: center;
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 3vw, 3.2rem);
            text-align: center;
            letter-spacing: 0.16em;
            color: #5a315a;
        }
        p {
            margin: 0 0 18px;
            text-align: center;
            color: #5f4a63;
            line-height: 1.5;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }
        .top-bar .hint {
            flex: 1;
            color: #6f496b;
            font-size: 0.95rem;
        }
        .top-bar .counter {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(196, 167, 222, 0.5);
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 700;
            letter-spacing: 0.08em;
            min-width: 140px;
            text-align: center;
            color: #814d7f;
        }
        .timer {
            background: rgba(255, 238, 244, 0.85);
            border-radius: 999px;
            padding: 10px 14px;
            color: #8b3a72;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            border: 1px solid rgba(196, 167, 222, 0.35);
        }
        .problem {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 20px 0;
            color: #4b2f56;
        }
        .answer-input {
            width: 200px;
            padding: 12px;
            border: 2px solid rgba(192, 158, 206, 0.7);
            border-radius: 12px;
            font-size: 1.2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            color: #4b2f56;
            outline: none;
            margin: 0 auto;
            display: block;
        }
        .answer-input:focus {
            border-color: #ffb6d7;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .action-button {
            background: #ffd700;
            color: #111;
            border: none;
            border-radius: 14px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .action-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.18);
        }
        .status {
            text-align: center;
            margin-top: 18px;
            min-height: 1.4em;
            color: #6f496b;
            font-size: 1rem;
        }
        .status.success {
            color: #7fff00;
        }
        .status.error {
            color: #ff8c00;
        }
        .score {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 10px;
            color: #5a315a;
        }
        @media (max-width: 640px) {
            .problem {
                font-size: 2rem;
            }
            .answer-input {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="top-bar">
                <div class="hint">Solve as many math problems as you can in 60 seconds!</div>
                <div class="timer" id="timer">60</div>
            </div>
            <h1>Round 3: Math Sprint</h1>
            <p>Answer simple addition, subtraction, multiplication, and division problems.</p>
            <div class="problem" id="problem">Ready?</div>
            <input type="number" class="answer-input" id="answerInput" placeholder="Your answer">
            <div class="button-row">
                <button class="action-button" id="submitButton">Submit Answer</button>
                <button class="action-button" id="nextButton" disabled>Next Round</button>
            </div>
            <div class="score" id="score">Score: 0</div>
            <div class="status" id="statusText">Click submit to start!</div>
        </div>
    </div>
    <script>
        const problemEl = document.getElementById('problem');
        const answerInput = document.getElementById('answerInput');
        const submitButton = document.getElementById('submitButton');
        const nextButton = document.getElementById('nextButton');
        const scoreEl = document.getElementById('score');
        const statusText = document.getElementById('statusText');
        const timerEl = document.getElementById('timer');

        let score = 0;
        let timeLeft = 60;
        let timerId;
        let currentProblem = null;

        function generateProblem() {
            const difficulty = Math.floor(score / 5);
            const maxNum = 10 + difficulty * 10; // Starts at 10, increases by 10 every 5 correct
            const operations = ['+', '-', '*', '/'];
            const op = operations[Math.floor(Math.random() * operations.length)];
            let a, b;

            switch (op) {
                case '+':
                    a = Math.floor(Math.random() * maxNum) + 1;
                    b = Math.floor(Math.random() * maxNum) + 1;
                    break;
                case '-':
                    a = Math.floor(Math.random() * maxNum) + maxNum / 2;
                    b = Math.floor(Math.random() * a) + 1;
                    break;
                case '*':
                    a = Math.floor(Math.random() * (maxNum / 2)) + 1;
                    b = Math.floor(Math.random() * (maxNum / 2)) + 1;
                    break;
                case '/':
                    b = Math.floor(Math.random() * 9) + 2;
                    a = b * (Math.floor(Math.random() * (maxNum / 2)) + 1);
                    break;
            }

            const answer = eval(`${a} ${op} ${b}`);
            return { problem: `${a} ${op} ${b}`, answer };
        }

        function startCountdown() {
            submitButton.style.display = 'none';
            answerInput.style.display = 'none';
            problemEl.textContent = 'Ready...';
            statusText.textContent = '';
            
            setTimeout(() => {
                problemEl.textContent = 'Set...';
            }, 3000);
            
            setTimeout(() => {
                problemEl.textContent = 'Go!';
                startGame();
            }, 6000);
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            scoreEl.textContent = `Score: ${score}`;
            timerEl.textContent = timeLeft;
            statusText.textContent = '';
            nextButton.disabled = true;
            submitButton.style.display = 'inline-block';
            answerInput.style.display = 'inline-block';
            submitButton.disabled = false;
            answerInput.disabled = false;
            answerInput.focus();

            timerId = setInterval(() => {
                timeLeft -= 1;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            nextProblem();
        }

        function nextProblem() {
            currentProblem = generateProblem();
            problemEl.textContent = currentProblem.problem;
            answerInput.value = '';
            answerInput.focus();
        }

        function checkAnswer() {
            const userAnswer = parseFloat(answerInput.value);
            if (userAnswer === currentProblem.answer) {
                score += 1;
                scoreEl.textContent = `Score: ${score}`;
                statusText.textContent = 'Correct!';
                statusText.className = 'status success';
            } else {
                timeLeft = Math.max(0, timeLeft - 5);
                timerEl.textContent = timeLeft;
                statusText.textContent = `Wrong! Answer was ${currentProblem.answer}`;
                statusText.className = 'status error';
            }
            setTimeout(() => {
                nextProblem();
                statusText.textContent = '';
                statusText.className = 'status';
            }, 1000);
        }

        function endGame() {
            clearInterval(timerId);
            problemEl.textContent = 'Time\'s up!';
            answerInput.disabled = true;
            submitButton.disabled = true;
            statusText.textContent = `Final Score: ${score} correct answers! Advancing to Round 4...`;
            statusText.className = 'status success';
            setTimeout(() => {
                window.location.href = 'roundfour.html';
            }, 2000);
        }

        submitButton.addEventListener('click', () => {
            if (!timerId) {
                startCountdown();
            } else {
                checkAnswer();
            }
        });

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!timerId) {
                    startCountdown();
                } else {
                    checkAnswer();
                }
            }
        });

        nextButton.addEventListener('click', () => {
            window.location.href = 'roundfour.html';
        });
    </script>
</body>
</html>
