<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Games - Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cinzel', serif;
            background-color: white;
            color: black;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 1s ease, color 1s ease;
        }
        h1 {
            font-size: clamp(1.6rem, 5vw, 3rem);
            margin-bottom: clamp(24px, 5vh, 50px);
            text-align: center;
            padding: 0 12px;
        }
        .box {
            position: absolute;
            width: min(300px, calc(100vw - 24px));
            min-height: 110px;
            height: auto;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
            padding: 12px;
            box-sizing: border-box;
        }
        .box:hover {
            background-color: #f0f0f0;
        }
        .box h2 {
            font-size: 1.5em;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Brain Games</h1>
    <div id="startBox" class="box">
        <h2>Start Today's Challenge</h2>
    </div>
    <div id="moreGamesBox" class="box">
        <h2>More Games....</h2>
    </div>
    <script>
        const h1 = document.querySelector('h1');
        const startBox = document.getElementById('startBox');
        const navigateToRoundOne = () => {
            window.location.href = 'roundone.html';
        };
        startBox.addEventListener('click', navigateToRoundOne);
        startBox.addEventListener('mousedown', navigateToRoundOne);
        const moreGamesBox = document.getElementById('moreGamesBox');
        moreGamesBox.addEventListener('click', () => { window.location.href = 'moregames.html'; });
        let direction = 1;
        setInterval(() => {
            h1.style.transform = `translateY(${direction * 10}px)`;
            direction *= -1;
        }, 300);

        const boxes = document.querySelectorAll('.box');
        let lastStartMoveAt = 0;
        let lastMoreMoveAt = 0;
        boxes.forEach(box => {
            // Set initial random position for each box
            const bW = box.offsetWidth;
            const bH = box.offsetHeight;
            const x = Math.random() * Math.max(0, window.innerWidth - bW);
            const y = Math.random() * Math.max(0, window.innerHeight - bH);
            box.style.left = `${x}px`;
            box.style.top = `${y}px`;
            
            // Add mouseenter listener to move on hover
            box.addEventListener('mouseenter', () => {
                const isNudgeBox = box.id === 'startBox' || box.id === 'moreGamesBox';
                if (isNudgeBox) {
                    const now = Date.now();
                    const lastMove = box.id === 'startBox' ? lastStartMoveAt : lastMoreMoveAt;
                    if (now - lastMove < 450) return;
                    if (box.id === 'startBox') lastStartMoveAt = now;
                    else lastMoreMoveAt = now;

                    const currentX = parseFloat(box.style.left) || 0;
                    const currentY = parseFloat(box.style.top) || 0;
                    const nudgeX = (Math.random() - 0.5) * 180;
                    const nudgeY = (Math.random() - 0.5) * 120;
                    const maxX = Math.max(0, window.innerWidth - box.offsetWidth);
                    const maxY = Math.max(0, window.innerHeight - box.offsetHeight);

                    box.style.left = `${Math.max(0, Math.min(maxX, currentX + nudgeX))}px`;
                    box.style.top  = `${Math.max(0, Math.min(maxY, currentY + nudgeY))}px`;
                    return;
                }

                const newX = Math.random() * Math.max(0, window.innerWidth - box.offsetWidth);
                const newY = Math.random() * Math.max(0, window.innerHeight - box.offsetHeight);
                box.style.left = `${newX}px`;
                box.style.top = `${newY}px`;
            });
        });

        window.addEventListener('resize', () => {
            boxes.forEach(b => {
                const bw = b.offsetWidth;
                const bh = b.offsetHeight;
                const cx = parseFloat(b.style.left) || 0;
                const cy = parseFloat(b.style.top) || 0;
                b.style.left = `${Math.max(0, Math.min(window.innerWidth - bw, cx))}px`;
                b.style.top = `${Math.max(0, Math.min(window.innerHeight - bh, cy))}px`;
            });
        });

        const palette = [
            { bg: '#2f80ed', text: '#ffffff' },
            { bg: '#ff6ec7', text: '#ffffff' },
            { bg: '#ff4d4d', text: '#ffffff' },
            { bg: '#f9d342', text: '#111111' },
            { bg: '#ff8a3d', text: '#111111' },
            { bg: '#9b51e0', text: '#ffffff' },
            { bg: '#6fcf97', text: '#111111' },
            { bg: '#4b56d2', text: '#ffffff' },
            { bg: '#b8d8ff', text: '#111111' },
            { bg: '#ffd6ff', text: '#111111' },
            { bg: '#ff9eea', text: '#111111' },
            { bg: '#ffdf7e', text: '#111111' }
        ];
        let currentColor = 0;
        document.body.style.backgroundColor = palette[currentColor].bg;
        document.body.style.color = palette[currentColor].text;
        setInterval(() => {
            currentColor = (currentColor + 1) % palette.length;
            document.body.style.backgroundColor = palette[currentColor].bg;
            document.body.style.color = palette[currentColor].text;
        }, 500);
    </script>
</body>
</html>
